<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚓ BLACK PEARL</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0f1c;--bg-card:rgba(15,23,42,0.7);--bg-card-solid:#0f172a;
    --deep-sea:#020617;--ocean:#0f172a;
    --primary:#40d4a8;--primary-dark:#14b8a6;--primary-light:#5eead4;
    --primary-glow:rgba(64,212,168,0.5);
    --border:rgba(64,212,168,0.2);--border-strong:rgba(64,212,168,0.4);
    --text:#e2e8f0;--text-dim:#64748b;--pearl:#f8fafc;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:100px}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(64,212,168,0.08),transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(94,234,212,0.1),transparent 50%),linear-gradient(180deg,rgba(2,6,23,0.9),rgba(15,23,42,0.7));pointer-events:none;z-index:0}
  .app{position:relative;z-index:1}
  .header{padding:24px 20px 20px;text-align:center}
  .ship-logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:8px;justify-content:center}
  .ship-icon{color:var(--primary);filter:drop-shadow(0 0 20px var(--primary-glow));animation:shipFloat 4s ease-in-out infinite}
  @keyframes shipFloat{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(-2deg)}75%{transform:translateY(5px) rotate(2deg)}}
  .header h1{font-size:28px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header .sub{font-size:10px;color:var(--text-dim);margin-top:6px;letter-spacing:3px;text-transform:uppercase}
  .user-card{margin:0 20px 20px;padding:20px;background:linear-gradient(135deg,rgba(64,212,168,0.08),rgba(15,23,42,0.6));border:2px solid var(--border);border-radius:20px;display:flex;align-items:center;gap:16px;backdrop-filter:blur(20px);position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
  .avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:var(--deep-sea);flex-shrink:0;box-shadow:0 4px 20px var(--primary-glow);border:3px solid var(--primary);font-size:24px;font-weight:800}
  .user-info{flex:1;min-width:0}
  .user-info .name{font-weight:700;font-size:16px;color:var(--primary)}
  .user-info .id{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:'SF Mono',Monaco,monospace}
  .user-badge{padding:6px 12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:var(--deep-sea);border-radius:12px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;box-shadow:0 2px 10px var(--primary-glow)}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;padding:0 20px}
  .stat{background:linear-gradient(135deg,var(--bg-card),var(--bg-card-solid));border:1px solid var(--border);border-radius:20px;padding:16px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
  .stat-icon{font-size:28px;margin-bottom:6px;color:var(--primary);filter:drop-shadow(0 0 10px var(--primary-glow));display:flex;justify-content:center}
  .stat-value{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-label{font-size:10px;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
  .card{background:linear-gradient(135deg,var(--bg-card),var(--bg-card-solid));border:1px solid var(--border);border-radius:20px;padding:18px;margin:0 20px 14px;transition:all 0.2s;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);opacity:0.5}
  .card:active{transform:scale(0.98);border-color:var(--border-strong)}
  .order-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
  .order-id{font-size:13px;color:var(--text-dim);font-family:'SF Mono',Monaco,monospace}
  .order-id b{color:var(--primary);font-size:15px}
  .status{padding:5px 12px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border:1px solid}
  .status.pending{background:rgba(64,212,168,0.1);color:var(--primary);border-color:rgba(64,212,168,0.4)}
  .status.paid{background:rgba(94,234,212,0.1);color:var(--primary-light);border-color:rgba(94,234,212,0.4)}
  .status.shipped{background:rgba(45,212,191,0.1);color:#67e8f9;border-color:rgba(45,212,191,0.4)}
  .status.delivered{background:rgba(16,185,129,0.1);color:#34d399;border-color:rgba(16,185,129,0.4)}
  .status.ready{background:rgba(239,68,68,0.1);color:#f87171;border-color:rgba(239,68,68,0.4)}
  .order-items{font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.6}
  .order-items span{color:var(--pearl)}
  .order-foot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border)}
  .price{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .track-btn{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:var(--deep-sea);border:none;padding:8px 16px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px var(--primary-glow)}
  .track-btn:active{transform:scale(0.95)}
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,28,0.95);backdrop-filter:blur(20px);border-top:2px solid var(--border);display:flex;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:100}
  .nav::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--primary),transparent);opacity:0.5}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:10px;font-weight:600;transition:all 0.2s}
  .nav-item .icon{font-size:24px;transition:all 0.2s;color:var(--primary)}
  .nav-item.active{color:var(--primary)}
  .nav-item.active .icon{filter:drop-shadow(0 0 10px var(--primary-glow));transform:translateY(-3px)}
  .page{display:none;padding:0 20px;animation:fadeIn 0.4s ease}
  .page.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .page-title{font-size:20px;font-weight:800;margin-bottom:20px;color:var(--primary)}
  .empty{text-align:center;padding:50px 20px;color:var(--text-dim)}
  .empty-icon{font-size:64px;margin-bottom:16px;opacity:0.5}
  .modal{display:none;position:fixed;inset:0;background:rgba(2,6,23,0.9);backdrop-filter:blur(10px);z-index:200;align-items:flex-end;justify-content:center}
  .modal.active{display:flex}
  .modal-content{background:linear-gradient(180deg,var(--bg-card-solid),var(--bg-card));border:2px solid var(--border-strong);border-radius:28px 28px 0 0;padding:28px 24px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp 0.3s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-title{font-size:20px;font-weight:800;margin-bottom:20px;text-align:center;color:var(--primary)}
  .modal-close{width:100%;background:var(--bg-card-solid);color:var(--text);border:1px solid var(--border);padding:16px;border-radius:16px;font-size:14px;font-weight:600;margin-top:20px;cursor:pointer}
  .timeline{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
  .tl-step{display:flex;gap:14px;padding-bottom:14px;position:relative}
  .tl-step:not(:last-child)::before{content:'';position:absolute;left:13px;top:26px;bottom:0;width:2px;background:var(--border)}
  .tl-step.done:not(:last-child)::before{background:linear-gradient(180deg,var(--primary),var(--primary-light))}
  .tl-dot{width:28px;height:28px;border-radius:50%;background:var(--bg-card-solid);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;z-index:1}
  .tl-step.done .tl-dot{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-color:transparent;color:var(--deep-sea);font-weight:800;box-shadow:0 0 15px var(--primary-glow)}
  .tl-info{flex:1;padding-top:4px}
  .tl-title{font-size:13px;font-weight:600}
  .tl-step:not(.done) .tl-title{color:var(--text-dim)}
  .tl-date{font-size:11px;color:var(--text-dim);margin-top:2px}
  .admin-panel{display:none;margin:0 20px 20px;padding:16px;background:var(--bg-card);border:1px solid var(--border-strong);border-radius:16px}
  .admin-panel.visible{display:block}
  .admin-panel label{display:block;margin-bottom:8px;color:var(--primary);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .admin-panel select{width:100%;padding:10px;background:var(--bg-card-solid);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;cursor:pointer}
  .admin-panel select:focus{outline:none;border-color:var(--primary)}
  .admin-panel .admin-label{font-size:10px;color:var(--text-dim);margin-top:6px;text-align:center}
  .loading{text-align:center;padding:40px;color:var(--text-dim)}
</style>
</head>

function applyTheme(name){const t=THEMES[name];if(!t)return;const r=document.documentElement.style;r.setProperty('--primary',t.primary);r.setProperty('--primary-dark',t.primaryDark);r.setProperty('--primary-light',t.primaryLight);r.setProperty('--primary-glow',t.primaryGlow);r.setProperty('--border',t.border);r.setProperty('--border-strong',t.borderStrong);r.setProperty('--bg',t.bg);r.setProperty('--bg-card',t.bgCard);r.setProperty('--bg-card-solid',t.bgCardSolid)}
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();tg.setHeaderColor('#0a0f1c');tg.setBackgroundColor('#0a0f1c')}
const user=tg?.initDataUnsafe?.user;const userData={id:user?.id||123456789,firstName:user?.first_name||'Пират',lastName:user?.last_name||'',username:user?.username||'pirate'};
document.getElementById('userName').textContent=`${userData.firstName} ${userData.lastName}`.trim();
document.getElementById('userId').textContent=`id: ${userData.id}`;
const API_URL='https://script.google.com/macros/s/AKfycbxsmQHp9uwLhKwoiTKq7d0kwksuShCpR5oO_nqFEqr9kOqPxlZmpzN7EQmQSKwe9eYO/exec';
async function loadTheme(){try{const res=await fetch(`${API_URL}?action=getTheme`);const data=await res.json();applyTheme(data.theme||'pirate');document.getElementById('themeSelect').value=data.theme||'pirate'}catch(e){applyTheme('pirate')}}
async function checkAdmin(){try{const res=await fetch(`${API_URL}?action=isAdmin&userId=${userData.id}`);const data=await res.json();if(data.isAdmin)document.getElementById('adminPanel').classList.add('visible')}catch(e){}}
async function adminSetTheme(themeName){try{await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'setTheme',theme:themeName})});applyTheme(themeName)}catch(e){alert('Ошибка сохранения')}}
function showPage(name){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelector(`.nav-item[data-page="${name}"]`)?.classList.add('active')}
document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>showPage(btn.dataset.page)));
const orders=[{id:'BP-2026-0142',items:['NewJeans — Ditto PB','BTS — Butter Set'],total:8450,status:'shipped',created:'2026-06-15',timeline:[{title:'Заказ создан',date:'15 июн',done:true},{title:'Оплачен',date:'15 июн',done:true},{title:'В пути',date:'28 июн',done:true},{title:'Готов',date:'—',done:false}]},{id:'BP-2026-0098',items:['aespa — Drama Album'],total:3200,status:'delivered',created:'2026-05-20',timeline:[{title:'Заказ создан',date:'20 мая',done:true},{title:'Оплачен',date:'20 мая',done:true},{title:'Получен',date:'18 июн',done:true}]}];
const boxes=[{id:'BOX-7721',orderId:'BP-2026-0142',address:'Москва, Тверская 15',items:['NewJeans Ditto PB'],readyDate:'05 июл',pickupCode:'A-42'}];
const statusLabels={pending:'Ждёт оплаты',paid:'Оплачен',shipped:'В плавании',delivered:'Получен',ready:'На острове'};
function renderOrders(){document.getElementById('ordersList').innerHTML=orders.length?orders.map(o=>`<div class="card"><div class="order-head"><div class="order-id">№ <b>${o.id}</b></div><div class="status ${o.status}">${statusLabels[o.status]}</div></div><div class="order-items">${o.items.map(i=>'<span>'+i+'</span>').join('<br>')}</div><div class="order-foot"><div class="price">${o.total.toLocaleString('ru')} ₽</div><button class="track-btn" onclick="showDetails('${o.id}')">На карту →</button></div></div>`).join(''):'<div class="empty"><div class="empty-icon">‍☠️</div>Нет сокровищ</div>'}
function renderBoxes(){document.getElementById('boxesList').innerHTML=boxes.length?boxes.map(b=>`<div class="card"><div style="font-weight:700;color:var(--primary);margin-bottom:8px">📦 ${b.id}</div><div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">${b.address}</div><button class="track-btn" onclick="showCode('${b.pickupCode}')">Показать код</button></div>`).join(''):'<div class="empty"><div class="empty-icon">📦</div>Нет сундуков</div>'}
function showDetails(id){const o=orders.find(x=>x.id===id);if(!o)return;document.getElementById('modalTitle').textContent=`⚓ ${o.id}`;document.getElementById('modalBody').innerHTML=`<div style="margin-bottom:16px">${o.items.map(i=>`<div style="padding:6px 0;border-bottom:1px solid var(--border)">${i}</div>`).join('')}</div><div class="timeline">${o.timeline.map(s=>`<div class="tl-step ${s.done?'done':''}"><div class="tl-dot">${s.done?'✓':'○'}</div><div class="tl-info"><div class="tl-title">${s.title}</div><div class="tl-date">${s.date}</div></div></div>`).join('')}</div>`;document.getElementById('modal').classList.add('active')}
function showCode(code){document.getElementById('modalTitle').textContent='⚓ Код выдачи';document.getElementById('modalBody').innerHTML=`<div style="text-align:center;padding:20px"><div style="font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:8px;padding:24px;border:2px solid var(--primary);border-radius:16px">${code}</div></div>`;document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
loadTheme();checkAdmin();renderOrders();renderBoxes();
</script>
